<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Fornecedor')}"></head>
<body>
<nav th:replace="~{fragments/head :: header()}"></nav>

<div class="container">
  <div class="card" style="max-width: 560px; margin: 0 auto;">
    <h2 class="page-title" style="margin-top:0"
        th:text="${fornecedor.id != null} ? 'Editar Fornecedor' : 'Novo Fornecedor'"></h2>

    <form th:action="@{/fornecedor/save}" th:object="${fornecedor}" method="post">
      <input type="hidden" th:field="*{id}" />
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" th:field="*{nome}" class="form-control"
               placeholder="Razão social do fornecedor" required />
      </div>

      <div class="form-group">
        <label for="cnpj">CNPJ</label>
        <input type="text" id="cnpj" th:field="*{cnpj}" class="form-control"
               placeholder="00.000.000/0000-00" />
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" th:field="*{email}" class="form-control"
               placeholder="contato@fornecedor.com" />
      </div>

      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" th:field="*{telefone}" class="form-control"
               placeholder="(00) 00000-0000" />
      </div>

      <div style="display:flex; gap:10px; margin-top:8px;">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a th:href="@{/fornecedor}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<footer class="footer">Supermercado dos Operários &copy; 2025</footer>
</body>
</html>
