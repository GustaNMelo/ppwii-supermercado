<head th:fragment="head(title)">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${title} + ' — Supermercado dos Operários'"></title>
  <link rel="stylesheet" th:href="@{/css/custom.css}"/>
</head>

<nav
  th:fragment="header()"
  class="topbar"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
>
  <a class="topbar-brand" th:href="@{/}">
    <img src="/images/logo.png" alt="Supermercado dos Operários" class="topbar-logo" />
  </a>

  <div class="topbar-nav">
    <a th:href="@{/}">Início</a>
    <a th:href="@{/categoria}">Categorias</a>
    <a th:href="@{/fornecedor}">Fornecedores</a>
    <a th:href="@{/produto}">Produtos</a>
    <a sec:authorize="hasAuthority('Admin')" th:href="@{/usuario}">Usuários</a>
  </div>

  <div class="topbar-right">
    <form action="/logout" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <button type="submit" class="btn-logout">Sair</button>
    </form>
  </div>
</nav>
