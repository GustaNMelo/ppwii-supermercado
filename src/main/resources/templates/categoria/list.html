<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{fragments/head :: head('Categorias')}"></head>
<body>
<nav th:replace="~{fragments/head :: header()}"></nav>

<div class="container">
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Categorias</span>
      <a sec:authorize="hasAnyAuthority('Admin','Gerente')"
         th:href="@{/categoria/create}" class="btn btn-primary btn-sm">+ Nova Categoria</a>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Descrição</th>
            <th sec:authorize="hasAnyAuthority('Admin','Gerente')">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="cat : ${categorias}">
            <td th:text="${cat.id}"></td>
            <td th:text="${cat.nome}"></td>
            <td th:text="${cat.descricao}"></td>
            <td sec:authorize="hasAnyAuthority('Admin','Gerente')">
              <a th:href="@{/categoria/edit/{id}(id=${cat.id})}" class="btn btn-secondary btn-sm">Editar</a>
              <a th:href="@{/categoria/delete/{id}(id=${cat.id})}" class="btn btn-danger btn-sm"
                 onclick="return confirm('Excluir esta categoria?')">Excluir</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(categorias)}">
            <td colspan="4">
              <div class="empty-state">Nenhuma categoria cadastrada.</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<footer class="footer">Supermercado dos Operários &copy; 2025</footer>
</body>
</html>
