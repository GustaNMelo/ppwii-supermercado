<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Categoria')}"></head>
<body>
<nav th:replace="~{fragments/head :: header()}"></nav>

<div class="container">
  <div class="card" style="max-width: 560px; margin: 0 auto;">
    <h2 class="page-title" style="margin-top:0"
        th:text="${categoria.id != null} ? 'Editar Categoria' : 'Nova Categoria'"></h2>

    <form th:action="@{/categoria/save}" th:object="${categoria}" method="post">
      <input type="hidden" th:field="*{id}" />
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" th:field="*{nome}" class="form-control"
               placeholder="Ex: Hortifruti" required />
      </div>

      <div class="form-group">
        <label for="descricao">Descrição</label>
        <input type="text" id="descricao" th:field="*{descricao}" class="form-control"
               placeholder="Descrição da categoria (opcional)" />
      </div>

      <div style="display:flex; gap:10px; margin-top:8px;">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a th:href="@{/categoria}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<footer class="footer">Supermercado dos Operários &copy; 2025</footer>
</body>
</html>
