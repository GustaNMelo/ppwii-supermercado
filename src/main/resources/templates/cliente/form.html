<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Cliente')}"></head>
<body>
<nav th:replace="~{fragments/head :: header()}"></nav>

<div class="container">
  <div class="card" style="max-width: 560px; margin: 0 auto;">
    <h2 class="page-title" style="margin-top:0"
        th:text="${cliente.id != null} ? 'Editar Cliente' : 'Novo Cliente'"></h2>

    <form th:action="@{/cliente/save}" th:object="${cliente}" method="post">
      <input type="hidden" th:field="*{id}" />
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" th:field="*{nome}" class="form-control"
               placeholder="Nome completo" />
        <span class="alert alert-danger" style="display:block; padding:6px 10px; margin-top:4px;"
              th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
      </div>

      <div class="form-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" th:field="*{cpf}" class="form-control"
               placeholder="000.000.000-00" />
        <span class="alert alert-danger" style="display:block; padding:6px 10px; margin-top:4px;"
              th:if="${#fields.hasErrors('cpf')}" th:errors="*{cpf}"></span>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" th:field="*{email}" class="form-control"
               placeholder="cliente@email.com" />
        <span class="alert alert-danger" style="display:block; padding:6px 10px; margin-top:4px;"
              th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
      </div>

      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" th:field="*{telefone}" class="form-control"
               placeholder="(00) 00000-0000" />
        <span class="alert alert-danger" style="display:block; padding:6px 10px; margin-top:4px;"
              th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}"></span>
      </div>

      <div style="display:flex; gap:10px; margin-top:8px;">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a th:href="@{/cliente}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<footer class="footer">Supermercado dos Operários &copy; 2025</footer>

<script>
  document.getElementById('cpf').addEventListener('input', function (e) {
    let v = e.target.value.replace(/\D/g, '');
    if (v.length > 11) v = v.substring(0, 11);
    if (v.length > 9)      v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    e.target.value = v;
  });
</script>
</body>
</html>
