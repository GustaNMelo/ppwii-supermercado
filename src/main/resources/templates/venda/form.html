<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Nova Venda')}"></head>
<body>
<nav th:replace="~{fragments/head :: header()}"></nav>

<div class="container">
  <div class="card" style="max-width: 720px; margin: 0 auto;">
    <h2 class="page-title" style="margin-top:0">Nova Venda</h2>

    <form id="vendaForm" th:action="@{/venda/save}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="form-group">
        <label for="clienteId">Cliente</label>
        <select id="clienteId" name="clienteId" class="form-control" required>
          <option value="">-- Selecione o cliente --</option>
          <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome}"></option>
        </select>
      </div>

      <div style="margin-bottom: 12px;">
        <label style="font-size:13px; font-weight:600; color:var(--text-s);">Produtos</label>
      </div>

      <div id="itens">
        <!-- linhas de produto adicionadas pelo JS -->
      </div>

      <button type="button" class="btn btn-secondary btn-sm" onclick="adicionarItem()" style="margin-bottom:20px;">
        + Adicionar Produto
      </button>

      <div style="display:flex; gap:10px; margin-top:8px;">
        <button type="submit" class="btn btn-primary">Registrar Venda</button>
        <a th:href="@{/venda}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<footer class="footer">Supermercado dos Operários &copy; 2025</footer>

<script th:inline="javascript">
  const produtos = /*[[${produtos}]]*/ [];

  function adicionarItem() {
    const container = document.getElementById('itens');
    const div = document.createElement('div');
    div.style.cssText = 'display:flex; gap:10px; align-items:center; margin-bottom:10px;';

    let options = '<option value="">-- Produto --</option>';
    produtos.forEach(p => {
      options += `<option value="${p.id}" data-preco="${p.preco}">${p.nome} (R$ ${p.preco.toFixed(2).replace('.', ',')})</option>`;
    });

    div.innerHTML = `
      <select name="produtoIds" class="form-control" required onchange="calcularTotal()">${options}</select>
      <input type="number" name="quantidades" class="form-control" style="max-width:100px;"
             placeholder="Qtd" min="1" value="1" required oninput="calcularTotal()" />
      <button type="button" class="btn btn-danger btn-sm" onclick="this.parentElement.remove(); calcularTotal()">✕</button>
    `;
    container.appendChild(div);
  }

  function calcularTotal() {
    let total = 0;
    const selects = document.querySelectorAll('select[name="produtoIds"]');
    const qtds = document.querySelectorAll('input[name="quantidades"]');
    selects.forEach((sel, i) => {
      const opt = sel.selectedOptions[0];
      const preco = opt ? parseFloat(opt.dataset.preco || 0) : 0;
      const qtd = parseInt(qtds[i]?.value || 0);
      total += preco * qtd;
    });
    const el = document.getElementById('totalPreview');
    if (el) el.textContent = 'Total: R$ ' + total.toFixed(2).replace('.', ',');
  }

  // Adiciona primeira linha automaticamente
  adicionarItem();
</script>

<div id="totalPreview" style="text-align:right; font-weight:700; font-size:16px; color:var(--green); margin-top:8px; max-width:720px; margin-left:auto; margin-right:auto; padding: 0 20px;">
  Total: R$ 0,00
</div>

</body>
</html>
