<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{fragments/head :: head('Produtos')}"></head>
<body>
<nav th:replace="~{fragments/head :: header()}"></nav>

<div class="container">
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Produtos</span>
      <a sec:authorize="hasAnyAuthority('Admin','Gerente')"
         th:href="@{/produto/create}" class="btn btn-primary btn-sm">+ Novo Produto</a>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Categoria</th>
            <th>Descrição</th>
            <th>Fornecedores</th>
            <th sec:authorize="hasAnyAuthority('Admin','Gerente')">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${produtos}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.nome}"></td>
            <td th:text="'R$ ' + ${#numbers.formatDecimal(p.preco, 1, 'POINT', 2, 'COMMA')}"></td>
            <td th:text="${p.categoria != null ? p.categoria.nome : '-'}"></td>
            <td th:text="${p.descricao}"></td>
            <td>
              <span th:each="f, iter : ${p.fornecedores}"
                    th:text="${f.nome + (iter.last ? '' : ', ')}"></span>
              <span th:if="${p.fornecedores == null || p.fornecedores.isEmpty()}">-</span>
            </td>
            <td sec:authorize="hasAnyAuthority('Admin','Gerente')">
              <a th:href="@{/produto/edit/{id}(id=${p.id})}" class="btn btn-secondary btn-sm">Editar</a>
              <a th:href="@{/produto/delete/{id}(id=${p.id})}" class="btn btn-danger btn-sm"
                 onclick="return confirm('Excluir este produto?')">Excluir</a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(produtos)}">
            <td colspan="6">
              <div class="empty-state">Nenhum produto cadastrado.</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<footer class="footer">Supermercado dos Operários &copy; 2025</footer>
</body>
</html>
