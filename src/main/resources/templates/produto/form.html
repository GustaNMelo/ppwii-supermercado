<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Produto')}"></head>
<body>
<nav th:replace="~{fragments/head :: header()}"></nav>

<div class="container">
  <div class="card" style="max-width: 560px; margin: 0 auto;">
    <h2 class="page-title" style="margin-top:0"
        th:text="${produto.id != null} ? 'Editar Produto' : 'Novo Produto'"></h2>

    <form th:action="@{/produto/save}" th:object="${produto}" method="post">
      <input type="hidden" th:field="*{id}" />
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="form-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" th:field="*{nome}" class="form-control"
               placeholder="Nome do produto" required />
      </div>

      <div class="form-group">
        <label for="preco">Preço (R$)</label>
        <input type="number" id="preco" th:field="*{preco}" class="form-control"
               placeholder="0,00" step="0.01" min="0" required />
      </div>

      <div class="form-group">
        <label for="descricao">Descrição</label>
        <input type="text" id="descricao" th:field="*{descricao}" class="form-control"
               placeholder="Descrição do produto (opcional)" />
      </div>

      <div class="form-group">
        <label for="categoria">Categoria</label>
        <select id="categoria" name="categoria.id" class="form-control">
          <option value="">-- Selecione --</option>
          <option th:each="cat : ${categorias}"
                  th:value="${cat.id}"
                  th:text="${cat.nome}"
                  th:selected="${produto.categoria != null && produto.categoria.id == cat.id}">
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Fornecedores</label>
        <div th:each="f : ${fornecedores}" class="form-check">
          <input type="checkbox" class="form-check-input"
                 name="fornecedorIds"
                 th:value="${f.id}"
                 th:checked="${produtoFornecedorIds.contains(f.id)}" />
          <label th:text="${f.nome}"></label>
        </div>
        <div th:if="${#lists.isEmpty(fornecedores)}" style="font-size:13px; color: var(--text-s);">
          Nenhum fornecedor cadastrado.
        </div>
      </div>

      <div style="display:flex; gap:10px; margin-top:8px;">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a th:href="@{/produto}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>

<footer class="footer">Supermercado dos Operários &copy; 2025</footer>
</body>
</html>
