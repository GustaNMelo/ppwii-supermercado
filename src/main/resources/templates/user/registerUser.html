<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <th:block th:replace="~{/../fragments/head :: head('Cadastro de Usuário')}"></th:block>
  <body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container">
      <div class="card" style="max-width: 480px; margin: 0 auto;">
        <h2 style="margin-bottom: 4px;">Cadastro de Usuário</h2>
        <p style="color: var(--text-s); font-size: 13px; margin-bottom: 24px;">
          Crie um acesso de Gerente ou Operador para o sistema.
        </p>

        <form th:action="@{/usuario/save}" method="post">
          <div class="form-group">
            <label for="name">Nome</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="Nome completo" required/>
          </div>

          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="email@exemplo.com" required/>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required/>
          </div>

          <div class="form-group">
            <label>Papel (Role)</label>
            <div class="form-check">
              <input type="radio" class="form-check-input" name="roles" value="Gerente" id="roleGerente" checked/>
              <label class="form-check-label" for="roleGerente">Gerente</label>
            </div>
            <div class="form-check">
              <input type="radio" class="form-check-input" name="roles" value="Operador" id="roleOperador"/>
              <label class="form-check-label" for="roleOperador">Operador</label>
            </div>
          </div>

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-primary">Cadastrar</button>
          <a th:href="@{/usuario}" class="btn btn-secondary">Cancelar</a>
        </form>
      </div>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
  </body>
</html>
