<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Supermercado dos Operários</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
  <img src="/images/logo.png" alt="Supermercado dos Operários" class="login-page-logo" />
  <div class="login-wrap">
    <div class="login-title">Bem-vindo de volta</div>
    <div class="login-sub">Faça login para acessar o sistema</div>

    <div class="alert-error" th:if="${param.error}">
      E-mail ou senha incorretos. Tente novamente.
    </div>
    <div class="alert-logout" th:if="${param.logout}">
      Você saiu com sucesso.
    </div>

    <form th:action="@{/login}" method="post">
      <div class="field">
        <label for="username">E-mail</label>
        <input type="email" id="username" name="username" placeholder="seu@email.com" required autofocus>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="btn-login">Entrar</button>
    </form>
  </div>
</body>
</html>
